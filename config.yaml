# MAREN Configuration
# Sensitive values (API token, org ID) must be in .env — never here.

# Execution mode
dry_run: true                  # true = log only | false = execute live actions
poll_interval_seconds: 300     # polling interval in --loop mode
min_score_threshold: 2.0       # ignore issues scored below this

# Tier gates — enable one at a time, verify behavior, then escalate
enable_tier2: false            # port bounce, AP config push, WLAN toggle
enable_tier3: false            # device restart, bulk config push
tier3_confirm: false           # second confirmation required for Tier 3

# Output
webhook_url: ""                # optional webhook — paste Slack/Teams URL here
log_level: "INFO"              # DEBUG for more verbose output
audit_log_path: "maren_audit.json"
summary_output_dir: "summaries/"